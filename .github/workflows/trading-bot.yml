name: Stock Trading Bot

on:
  schedule:
      # All times in UTC (EST + 5)
      - cron: '0 11 * * 1-5'    # 06:00 AM EST — Morning scan + execute
      - cron: '0 17 * * 1-5'    # 12:00 PM EST — Midday position check
      - cron: '30 21 * * 1-5'   # 04:30 PM EST — Post-market review
  workflow_dispatch: {}         # Manual trigger button

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        run: |
            case "${{ github.event.schedule }}" in
              "0 11 * * 1-5")  echo "BOT_MODE=scan"    >> $GITHUB_ENV ;;
              "0 17 * * 1-5")  echo "BOT_MODE=monitor"  >> $GITHUB_ENV ;;
              "30 21 * * 1-5") echo "BOT_MODE=review"   >> $GITHUB_ENV ;;
              "")               echo "BOT_MODE=manual"   >> $GITHUB_ENV ;;
              *)                echo "BOT_MODE=monitor"  >> $GITHUB_ENV ;;
            esac

      - name: Run trading bot
        working-directory: src
        run: python main.py --mode ${{ env.BOT_MODE }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}

      - name: Commit vault updates
        run: |
          git config user.name "Stock Bot"
          git config user.email "bot@stockagents.local"
          git add stock/
          git diff --staged --quiet || git commit -m "Bot: $(date +%Y-%m-%d_%H:%M) update"
          git push
